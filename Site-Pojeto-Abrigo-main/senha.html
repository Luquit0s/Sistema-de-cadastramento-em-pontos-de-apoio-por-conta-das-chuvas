<!DOCTYPE html>
<html lang="pt-br">

<head> <!-- Parte invisível -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Gov.br</title>
    <link rel="stylesheet" href="css/senha.css"/>
    <link rel="icon" type="image/png" sizes="48x48" href="./Imagem/icon.gov.png">
</head>

<body>

    <!-- Cabeçalho -->
    <header>
        <img src="https://sso.acesso.gov.br/assets/govbr/img/govbr.png" alt="Logo Gov.br">
    </header>

    <!-- Conteúdo -->
    <div class="container">

        <!-- Imagem -->
        <div class="imagem">
            <img src="https://sso.acesso.gov.br/assets/govbr/img/senha.png" alt="Imagem Gov.br">
        </div>

        <!-- Login -->
        <div class="card">

            <h2>Digite sua senha</h2>

            <label>CPF: <span id="cpfExibido"></span></label>

            <form>

                <label for="senha">Senha</label>

                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    minlength="8"
                    required
                    aria-invalid="false">

                <button id="entrar" type="button">Entrar</button>
                <button id="cancelar" type="button">Cancelar</button>

                <div class="esqueci">
                    <a href="#">Esqueci minha senha</a>
                </div>

            </form>

        </div>

    </div>

    <!-- Rodapé -->
    <footer>
        &copy; 2026 Página ilustrativa - Sistema Gov.br
    </footer>
</body>
</html>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const cpf = localStorage.getItem("cpf_usuario");

    // Se não existir CPF salvo, volta para a tela anterior
    if (!cpf) {
        window.location.href = "gov.html";
        return;
    }

    // Formata CPF
    const cpfFormatado = cpf
        .replace(/(\d{3})(\d)/, "$1.$2")
        .replace(/(\d{3})(\d)/, "$1.$2")
        .replace(/(\d{3})(\d{1,2})$/, "$1-$2");

    // Exibe CPF formatado
    document.getElementById("cpfExibido").textContent = cpfFormatado;

    const senhaInput = document.getElementById("senha");
    const entrarBtn = document.getElementById("entrar");
    const cancelarBtn = document.getElementById("cancelar");

    // Botão Entrar
    entrarBtn.addEventListener("click", (e) => {
        e.preventDefault();

        const senha = senhaInput.value.trim();

        if (senha === "") {
            alert("Digite sua senha.");
            senhaInput.focus();
            senhaInput.setAttribute("aria-invalid", "true");
            return;
        }

        if (senha.length < 8) {
            alert("A senha deve possuir pelo menos 8 caracteres.");
            senhaInput.focus();
            senhaInput.setAttribute("aria-invalid", "true");
            return;
        }

        senhaInput.setAttribute("aria-invalid", "false");

        window.location.href = "index.html";
    });

    // Remove estado de erro enquanto digita
    senhaInput.addEventListener("input", () => {
        senhaInput.setAttribute("aria-invalid", "false");
    });

    // Botão Cancelar
    cancelarBtn.addEventListener("click", (e) => {
        e.preventDefault();
        window.location.href = "gov.html";
    });

});
</script>
